     <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — Novaflowia</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

  <header class="site-header">
    <div class="container header-row">
      <a href="index.html" class="brand">NOVAFLOWIA</a>
      <span class="eyebrow gold">Painel Admin</span>
      <button id="logoutBtn" class="icon-btn" aria-label="Sair">🚪</button>
    </div>
  </header>

  <!-- 🔴 Tela de bloqueio: aparece se não for admin -->
  <div id="accessDenied" class="container section center" hidden>
    <h2 class="display">Acesso restrito</h2>
    <p class="muted">Você precisa estar logado como administrador.</p>
    <a href="index.html" class="cta" style="margin-top:20px;">Voltar à loja</a>
  </div>

  <!-- 🔵 Conteúdo do dashboard: só aparece após confirmar admin -->
  <main id="dashboardContent" class="container section" hidden>
    <header class="section-head" style="text-align:left;">
      <p class="eyebrow gold">Visão geral</p>
      <h2>Painel de Clientes</h2>
    </header>

    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-label">Total de clientes</span>
        <span id="statTotal" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Último registro</span>
        <span id="statUltimo" class="stat-value small">—</span>
      </div>
    </div>

    <input id="adminSearch" type="search" placeholder="Buscar cliente por nome..." />

    <canvas id="chartRegistros" height="180"></canvas>

    <div id="adminClientList" class="admin-client-list">
      <p class="muted center">Carregando clientes…</p>
    </div>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="dashboard.js"></script>
</body>
</html>
